spring:
  application:
    name: stock-dashboard-backend
  profiles:
    default: local
  data:
    redis:
      host: localhost
      port: 6379

market:
  watchlist: AAPL,MSFT,GOOGL,AMZN,TSLA,NVDA,META,NFLX,AMD,INTC
  snapshot-cadence-ms: 1000
  ingest-health-threshold-ms: 5000
  session:
    timezone: America/New_York
    open: "09:30"
    close: "16:00"
  mock-ingest:
    enabled: true
    tick-interval-ms: 200
  redis:
    max-retries: 3

logging:
  structured:
    format:
      console: logstash
